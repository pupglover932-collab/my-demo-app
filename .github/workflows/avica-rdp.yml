name: AvicaRDP

on:
  workflow_dispatch:

jobs:
  build:
    name: Start Avica RDP
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Setup Avica
        run: |
          Write-Host "🚀 Starting Avica RDP Setup..." -ForegroundColor Green
          
          Invoke-WebRequest -Uri "https://gitlab.com/userup908/my-rdp/-/raw/main/setup.py" -OutFile "setup.py"
          Invoke-WebRequest -Uri "https://download.avica.com/AvicaLite_v8.0.8.9.exe" -OutFile "Avica_setup.exe"
          Invoke-WebRequest -Uri "https://gitlab.com/userup908/my-rdp/-/raw/main/show.bat" -OutFile "show.bat"
          Invoke-WebRequest -Uri "https://gitlab.com/userup908/my-rdp/-/raw/main/loop.bat" -OutFile "loop.bat"
          
          python -m pip install requests pyautogui telegraph --quiet
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -ErrorAction SilentlyContinue
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          Write-Host "✅ RDP Enabled" -ForegroundColor Green

      - name: Create User
        run: |
          net user runneradmin TheDisa1a /add
          net localgroup Administrators runneradmin /add
          Write-Host "✅ User: runneradmin / TheDisa1a" -ForegroundColor Green

      - name: Install and Run Avica
        run: |
          Write-Host "⚡ Installing Avica..." -ForegroundColor Yellow
          Start-Process "Avica_setup.exe"
          Start-Sleep -Seconds 10
          python setup.py
          Write-Host "✅ Setup done! Look for GoFile link" -ForegroundColor Green

      - name: Connection Info
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "AVICA RDP CONNECTION" -ForegroundColor Cyan
          Write-Host "Telegram : @TheNetworkZoneOfficial" -ForegroundColor Cyan
          Write-Host "Username : runneradmin" -ForegroundColor Yellow
          Write-Host "Password : TheDisa1a" -ForegroundColor Yellow
          Write-Host "Wait for GoFile link in logs below" -ForegroundColor Yellow
          Write-Host "========================================" -ForegroundColor Cyan

      - name: Start Service
        run: cmd /c show.bat

      - name: Keep Alive
        run: cmd /c loop.bat
